<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ramadan Berkah - Arvan</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background-color: #f0fdf4;
        overflow-x: hidden;
      }

      /* Hero Section dengan Overlay yang lebih halus */
      .hero-section {
        background:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
          url("https://images.unsplash.com/photo-1564120282405-f3702170868f?q=80&w=2070&auto=format&fit=crop");
        background-size: cover;
        background-position: center;
        height: 100vh;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      /* Animasi Tombol agar lebih menarik di ASUS TUF Anda */
      #btn-thr {
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border-radius: 50px;
      }
      #btn-thr:hover {
        transform: scale(1.1) rotate(2deg);
        box-shadow: 0 10px 20px rgba(255, 193, 7, 0.4);
      }

      /* Glassmorphism untuk Modal */
      .modal-content {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border-radius: 20px;
      }
      .modal-header {
        border-radius: 20px 20px 0 0;
      }
    </style>
  </head>
  <body>
    <div class="hero-section">
      <div class="container" data-aos="fade-up">
        <h1 class="display-3 fw-bold mb-3">
          Selamat Menunaikan <br />
          Ibadah Puasa
        </h1>
        <p class="lead mb-5">
          Semoga keberkahan Ramadan menyertai kita semua, Arvan.
        </p>
        <button
          id="btn-thr"
          class="btn btn-warning btn-lg fw-bold px-5 py-3 shadow-lg"
        >
          🎁 KLIK UNTUK KEJUTAN THR!
        </button>
      </div>
    </div>

    <div class="modal fade" id="modalThr" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center border-0 shadow-2xl">
          <div
            class="modal-header bg-success text-white justify-content-center"
          >
            <h5 class="modal-title">🎉 KEJUTAN BERKAH! 🎉</h5>
          </div>
          <div class="modal-body py-5">
            <h2 class="text-success fw-bold">Selamat!</h2>
            <p class="fs-5">
              Anda mendapatkan paket <strong>THR Spesial Ramadan</strong>
            </p>
            <div class="display-1 animate__animated animate__tada">💰</div>
            <p class="mt-3 text-muted">
              Semoga <b>rejeki</b> <b>kamu</b> lancar!
            </p>
          </div>
          <div class="modal-footer justify-content-center border-0">
            <button
              type="button"
              class="btn btn-success px-4"
              data-bs-dismiss="modal"
            >
              Alhamdulillah
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      $(document).ready(function () {
        $("#btn-thr").click(function () {
          // Efek Confetti saat diklik
          var duration = 3 * 1000;
          var end = Date.now() + duration;

          (function frame() {
            confetti({
              particleCount: 7,
              angle: 60,
              spread: 55,
              origin: { x: 0 },
              colors: ["#ffc107", "#198754"],
            });
            confetti({
              particleCount: 7,
              angle: 120,
              spread: 55,
              origin: { x: 1 },
              colors: ["#ffc107", "#198754"],
            });

            if (Date.now() < end) {
              requestAnimationFrame(frame);
            }
          })();

          // Menampilkan Modal
          var myModal = new bootstrap.Modal(
            document.getElementById("modalThr"),
          );
          myModal.show();
        });
      });
    </script>
  </body>
</html>
