<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabel Bootstrap - Aji Tri Prasetyo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <table class="table table-hover">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Nama Lengkap</th>
            <th scope="col">Asal Kota</th>
            <th scope="col">Umur</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <th scope="row">1</th>
            <td>Akmal</td>
            <td>brazil</td>
            <td>22 th</td>
          </tr>
          <tr>
            <th scope="row">2</th>
            <td>Fahmi</td>
            <td>Purwokerto</td>
            <td>22</td>
          </tr>
          <tr>
            <th scope="row">3</th>
            <td>Awaldi</td>
            <td>cilacap</td>
            <td>27 th</td>
          </tr>
        </tbody>
      </table>

      <br /><br />

      <table class="table">
        <thead class="table-dark">
          <tr>
            <th scope="col">#</th>
            <th scope="col">Nama Lengkap</th>
            <th scope="col">Asal Kota</th>
            <th scope="col">Umur</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <th scope="row">1</th>
            <td>Arvan</td>
            <td>Tegal</td>
            <td>22 th</td>
          </tr>
          <tr>
            <th scope="row">2</th>
            <td>Aji</td>
            <td>Purwokerto</td>
            <td>20</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
